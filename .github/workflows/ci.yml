name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        nim-version:
          - "2.0.x"
          - "2.2.x"

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlite3-dev libpcre3-dev

      - name: Setup Nim ${{ matrix.nim-version }}
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-${{ matrix.nim-version }}-${{ hashFiles('**/*.nimble') }}
          restore-keys: |
            nimble-${{ matrix.nim-version }}-
            nimble-

      - name: Install nimble dependencies (core)
        working-directory: talos_core
        run: nimble install -y

      # talos_core is a library — nimble build does nothing, skip it.
      - name: Install agent dependencies only
        working-directory: talos_agent
        run: nimble install --depsOnly -y

      - name: Test core
        working-directory: talos_core
        env:
          CI: "true"

      - name: Build agent
        working-directory: talos_agent
        run: nimble build -y

      - name: Test agent
        working-directory: talos_agent
        run: nimble test -y
        env:
          CI: "true"

      - name: Build code
        working-directory: talos_code
        run: nimble build -y

      - name: Test code
        working-directory: talos_code
        run: nimble test -y
        env:
          CI: "true"
